<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shall we?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero panel">
      <p class="eyebrow">Random Matching</p>
      <h1>Shall we?</h1>
      <p class="hero-copy">랜덤 매칭을 시작하세요.</p>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>1. 기본 설정</h2>
      </div>
      <form id="config-form" class="config-form">
        <label>
          <span>그룹 A</span>
          <input id="group-a-label" name="groupALabel" type="text" maxlength="20" placeholder="예시: 참가자 이름" required>
        </label>
        <label>
          <span>그룹 B</span>
          <input id="group-b-label" name="groupBLabel" type="text" maxlength="20" placeholder="예시: 메뉴" required>
        </label>
        <label>
          <span>항목 수</span>
          <input id="count" name="count" type="number" min="4" max="12" value="6" placeholder="4~12" required>
        </label>
        <button type="submit" class="primary">입력칸 만들기</button>
      </form>
    </section>

    <section class="panel is-locked" id="inputs-panel">
      <div class="panel-head">
        <h2>2. 항목 입력</h2>
        <p id="input-guide">설정을 먼저 완료해 주세요.</p>
      </div>
      <div id="items-lock" class="locked-note">설정 후 입력 가능</div>
      <form id="items-form" class="items-form" hidden>
        <div class="item-columns">
          <div class="item-group">
            <h3 id="group-a-title">그룹 A</h3>
            <div id="group-a-fields" class="item-fields"></div>
          </div>
          <div class="item-group">
            <h3 id="group-b-title">그룹 B</h3>
            <div id="group-b-fields" class="item-fields"></div>
          </div>
        </div>
        <div class="action-row action-row-wide action-row-settings">
          <div class="toggle-group">
            <label class="toggle-chip" for="cinematic-toggle">
              <input id="cinematic-toggle" type="checkbox" checked>
              <span>시네마 오픈</span>
            </label>
            <label class="toggle-chip" for="tease-toggle">
              <input id="tease-toggle" type="checkbox">
              <span>카드 오픈 효과</span>
            </label>
          </div>
          <div class="build-actions">
            <button type="submit" class="primary" id="build-engine" disabled>매칭 준비</button>
            <button type="button" class="ghost" id="reset-all">초기화</button>
          </div>
        </div>
      </form>
    </section>

    <section class="panel is-locked" id="engine-panel">
      <div class="panel-head">
        <h2>3. 실행</h2>
        <p id="engine-status">항목 입력 후 준비해 주세요.</p>
      </div>
      <div id="engine-lock" class="locked-note">준비 전</div>
      <div id="engine-content" hidden>
        <div class="engine-stage">
          <div class="mode-view" id="cards-view">
            <div class="deck-stage tarot-stage single-deck-stage">
              <div class="deck-column single-deck-column">
                <div class="deck-stack deck-stack-main"></div>
              </div>
            </div>
            <div class="tarot-reveal-board" id="tarot-reveal-board"></div>
          </div>

          <div class="action-row action-row-run action-column">
            <button type="button" class="ghost" id="reroll-match" disabled>다시 섞기</button>
            <button type="button" class="primary" id="run-match" disabled>카드 공개</button>
          </div>
        </div>
      </div>
    </section>

    <section class="panel result-panel" id="result-panel">
      <div class="panel-head">
        <h2>4. 결과</h2>
      </div>
      <div id="result-empty" class="result-empty">결과가 없습니다.</div>
      <div id="result-summary" class="result-summary" hidden></div>
      <table id="result-table" class="result-table" hidden>
        <thead>
          <tr>
            <th id="result-head-a">그룹 A</th>
            <th id="result-head-b">그룹 B</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <div class="overlay" id="cinema-overlay" hidden>
    <div class="overlay-backdrop" data-close-overlay></div>
    <section class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
      <div class="overlay-head">
        <div>
          <p class="overlay-eyebrow">Cinematic Reveal</p>
          <h2 id="overlay-title">결과 오픈</h2>
        </div>
        <button type="button" class="overlay-close" id="overlay-close" aria-label="닫기">닫기</button>
      </div>
      <p class="overlay-status" id="overlay-status">카드를 눌러 시작하세요.</p>
      <div class="cinema-board" id="cinema-board"></div>
      <p class="overlay-hint" id="overlay-hint">카드 보드를 클릭하면 공개가 진행됩니다.</p>
    </section>
  </div>

  <script charset="utf-8" src="./script.js"></script>
</body>
</html>
